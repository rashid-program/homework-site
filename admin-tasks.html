<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>База заданий — Управление</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              blue: '#0399E9',
              'blue-hover': '#027BBF',
              'blue-light': '#E5F4FC',
              'blue-pale': '#F0F9FF',
            },
            ink: {
              dark: '#001B29',
              body: '#445371',
              muted: '#8D96AF',
              faint: '#A1A9B8',
            },
            surface: {
              page: '#DFE2EA',
              card: '#FFFFFF',
              middle: '#F3F4F7',
              border: '#E7E9EF',
              'border-strong': '#CFD2D9',
            },
            header: { bg: '#181E2B' },
            state: {
              green: '#019F3C',
              red: '#D91528',
              yellow: '#FBB82B',
            }
          },
          fontFamily: {
            montserrat: ['Montserrat', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          boxShadow: {
            'card': '0 1px 3px rgba(0,27,41,0.04), 0 4px 16px rgba(0,27,41,0.07)',
            'card-hover': '0 4px 8px rgba(0,27,41,0.06), 0 12px 32px rgba(3,153,233,0.12)',
            'btn': '0 2px 8px rgba(3,153,233,0.25)',
            'btn-hover': '0 4px 16px rgba(3,153,233,0.35)',
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; background: #DFE2EA; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #EEEFF2; }
    ::-webkit-scrollbar-thumb { background: #BFC1C4; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #8D96AF; }

    .task-card {
      background: #fff;
      border: 1.5px solid #E7E9EF;
      border-radius: 14px;
      cursor: pointer;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
      box-shadow: 0 1px 3px rgba(0,27,41,0.04), 0 4px 16px rgba(0,27,41,0.07);
    }
    .task-card:hover {
      border-color: #0399E9;
      box-shadow: 0 4px 8px rgba(0,27,41,0.06), 0 12px 32px rgba(3,153,233,0.12);
      transform: translateY(-2px);
    }
    .task-card:active { transform: translateY(0); }

    .task-number {
      font-size: 2rem;
      font-weight: 800;
      color: #0399E9;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .badge-count {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }
    .badge-filled { background: #E5F4FC; color: #027BBF; }
    .badge-empty  { background: #F3F4F7; color: #8D96AF; }

    .pagination-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      border: 1.5px solid #E7E9EF;
      background: #fff;
      color: #445371;
      cursor: pointer;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }
    .pagination-btn:hover { border-color: #0399E9; color: #0399E9; }
    .pagination-btn.active { background: #0399E9; border-color: #0399E9; color: #fff; }
    .pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .nav-link {
      color: #8D96AF;
      font-size: 0.8125rem;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .nav-link:hover { color: #0399E9; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-grid > * {
      animation: fadeInUp 0.3s ease both;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header style="background: #181E2B;" class="sticky top-0 z-30">
  <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="/admin.html" class="nav-link flex items-center gap-1.5">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Добавление задания
      </a>
      <span style="color: #445371; font-size: 12px;">·</span>
      <span style="color: #8D96AF; font-size: 0.8125rem; font-weight: 500;">База заданий</span>
    </div>
    <a href="/index.html" class="nav-link flex items-center gap-1.5">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h12M2 8l4-4M2 8l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" transform="rotate(180 8 8)"/></svg>
      Главная
    </a>
  </div>
</header>

<!-- MAIN -->
<main class="max-w-6xl mx-auto px-6 py-8">

  <!-- Page header -->
  <div class="mb-8">
    <div class="flex items-start justify-between">
      <div>
        <h1 style="font-size: 1.75rem; font-weight: 800; color: #001B29; letter-spacing: -0.03em; line-height: 1.2;">
          База заданий
        </h1>
        <p style="color: #8D96AF; font-size: 0.875rem; font-weight: 500; margin-top: 4px; line-height: 1.7;">
          25 типов заданий ОГЭ по математике · задания 1–5 показаны группой
        </p>
      </div>
      <div id="statsBlock" style="text-align: right; display: none;">
        <div id="totalCount" style="font-size: 1.5rem; font-weight: 800; color: #001B29; font-family: 'JetBrains Mono', monospace;"></div>
        <div style="font-size: 0.75rem; color: #8D96AF; font-weight: 500; margin-top: 2px;">заданий в базе</div>
      </div>
    </div>
  </div>

  <!-- Grid -->
  <div id="tasksGrid" class="grid gap-3" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));">
    <!-- Skeleton placeholders -->
    <div id="skeletonContainer" class="contents">
      <!-- JS will render actual content -->
    </div>
  </div>

  <!-- Pagination -->
  <div id="paginationBlock" class="mt-8 flex items-center justify-center gap-1.5" style="display: none !important;"></div>

  <!-- Error state -->
  <div id="errorState" class="hidden text-center py-16">
    <div style="font-size: 2.5rem; margin-bottom: 12px;">⚠️</div>
    <p style="color: #D91528; font-weight: 600; font-size: 0.9375rem;">Не удалось загрузить данные</p>
    <p style="color: #8D96AF; font-size: 0.8125rem; margin-top: 4px;">Проверьте, что сервер запущен (<code style="font-family: 'JetBrains Mono', monospace; font-size: 0.8125rem;">cd server && npm start</code>)</p>
    <button onclick="loadData()" class="mt-5 px-4 py-2 rounded-lg text-sm font-semibold" style="background: #0399E9; color: #fff; border: none; cursor: pointer; box-shadow: 0 2px 8px rgba(3,153,233,0.25);">
      Повторить
    </button>
  </div>
</main>

<script>
  const ITEMS_PER_PAGE = 25;
  const TOTAL_TYPES = 21; // 1 карточка для блока 1-5 + 20 карточек для 6-25
  let currentPage = 1;
  let taskTypesData = [];

  // Генерируем 21 скелетон (1 группа + 20 одиночных)
  function renderSkeletons() {
    const grid = document.getElementById('tasksGrid');
    grid.innerHTML = '';
    for (let i = 0; i < 21; i++) {
      const div = document.createElement('div');
      div.style.cssText = 'background: #fff; border: 1.5px solid #E7E9EF; border-radius: 14px; padding: 20px; animation: fadeInUp 0.3s ease both;';
      div.style.animationDelay = `${i * 0.03}s`;
      div.innerHTML = `
        <div style="width: 48px; height: 36px; background: #F3F4F7; border-radius: 6px; margin-bottom: 10px;"></div>
        <div style="width: 80px; height: 13px; background: #F3F4F7; border-radius: 4px; margin-bottom: 6px;"></div>
        <div style="width: 50px; height: 20px; background: #F3F4F7; border-radius: 6px;"></div>
      `;
      grid.appendChild(div);
    }
  }

  function renderGrid(typesData) {
    const grid = document.getElementById('tasksGrid');
    grid.innerHTML = '';

    // Группа 1-5: одна карточка
    const group15Count = [1,2,3,4,5].reduce((sum, id) => {
      const t = typesData.find(t => t.id === id);
      return sum + (t?._count?.tasks || 0);
    }, 0);

    const groupCard = document.createElement('div');
    groupCard.className = 'task-card';
    groupCard.style.cssText = 'padding: 20px 20px 18px; display: flex; flex-direction: column; gap: 10px; animation: fadeInUp 0.3s ease both; border-color: #B8DFF8;';
    groupCard.style.animationDelay = '0s';
    groupCard.innerHTML = `
      <div style="display:flex;align-items:baseline;gap:4px;">
        <div class="task-number" style="letter-spacing:-0.03em;">1</div>
        <div style="font-size:1.5rem;font-weight:800;color:#A1A9B8;line-height:1;">–</div>
        <div class="task-number" style="letter-spacing:-0.03em;">5</div>
      </div>
      <div style="font-size: 0.8125rem; font-weight: 600; color: #445371; line-height: 1.3;">Задания 1–5 <span style="color:#A1A9B8;font-weight:500;">(группа)</span></div>
      <div>
        <span class="badge-count ${group15Count > 0 ? 'badge-filled' : 'badge-empty'}">
          ${group15Count > 0 ? group15Count + ' шт.' : 'пусто'}
        </span>
      </div>
    `;
    groupCard.addEventListener('click', () => {
      window.location.href = '/admin-task-type.html?type=1';
    });
    groupCard.setAttribute('tabindex', '0');
    groupCard.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        window.location.href = '/admin-task-type.html?type=1';
      }
    });
    grid.appendChild(groupCard);

    // Карточки 6–25
    for (let typeNum = 6; typeNum <= 25; typeNum++) {
      const idx = typeNum - 5; // offset for animation delay
      const typeData = typesData.find(t => t.id === typeNum);
      const count = typeData?._count?.tasks || 0;

      const card = document.createElement('div');
      card.className = 'task-card';
      card.style.cssText = 'padding: 20px 20px 18px; display: flex; flex-direction: column; gap: 10px; animation: fadeInUp 0.3s ease both;';
      card.style.animationDelay = `${idx * 0.04}s`;
      card.innerHTML = `
        <div class="task-number">${String(typeNum).padStart(2, '0')}</div>
        <div style="font-size: 0.8125rem; font-weight: 600; color: #445371; line-height: 1.3;">Задание ${typeNum}</div>
        <div>
          <span class="badge-count ${count > 0 ? 'badge-filled' : 'badge-empty'}">
            ${count > 0 ? count + ' шт.' : 'пусто'}
          </span>
        </div>
      `;
      card.addEventListener('click', () => {
        window.location.href = `/admin-task-type.html?type=${typeNum}`;
      });
      card.setAttribute('tabindex', '0');
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          window.location.href = `/admin-task-type.html?type=${typeNum}`;
        }
      });
      grid.appendChild(card);
    }

    renderPagination();
    updateStats(typesData);
  }

  function renderPagination() {
    const totalPages = Math.ceil(TOTAL_TYPES / ITEMS_PER_PAGE); // = 1 (25/25)
    const block = document.getElementById('paginationBlock');

    if (totalPages <= 1) {
      block.style.display = 'none';
      return;
    }

    block.style.display = 'flex';
    block.innerHTML = '';

    // Prev
    const prev = document.createElement('button');
    prev.className = 'pagination-btn';
    prev.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 11L5 7l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    prev.disabled = currentPage === 1;
    prev.onclick = () => { currentPage--; renderGrid(taskTypesData); };
    block.appendChild(prev);

    for (let p = 1; p <= totalPages; p++) {
      const btn = document.createElement('button');
      btn.className = 'pagination-btn' + (p === currentPage ? ' active' : '');
      btn.textContent = p;
      btn.onclick = () => { currentPage = p; renderGrid(taskTypesData); };
      block.appendChild(btn);
    }

    // Next
    const next = document.createElement('button');
    next.className = 'pagination-btn';
    next.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 11l4-4-4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    next.disabled = currentPage === totalPages;
    next.onclick = () => { currentPage++; renderGrid(taskTypesData); };
    block.appendChild(next);
  }

  function updateStats(typesData) {
    const total = typesData.reduce((sum, t) => sum + (t._count?.tasks || 0), 0);
    if (total > 0) {
      document.getElementById('statsBlock').style.display = 'block';
      document.getElementById('totalCount').textContent = total.toLocaleString('ru');
    }
  }

  async function loadData() {
    document.getElementById('errorState').classList.add('hidden');
    renderSkeletons();

    try {
      const resp = await fetch('/api/task-types');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const json = await resp.json();
      if (!json.success) throw new Error(json.error || 'Ошибка API');

      taskTypesData = json.data;
      renderGrid(taskTypesData);
    } catch (err) {
      console.error(err);
      document.getElementById('tasksGrid').innerHTML = '';
      document.getElementById('errorState').classList.remove('hidden');
    }
  }

  loadData();
</script>
</body>
</html>
