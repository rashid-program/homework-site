<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              blue: '#0399E9',
              'blue-hover': '#027BBF',
              'blue-light': '#E5F4FC',
              'blue-pale': '#F0F9FF',
            },
            ink: {
              dark: '#001B29',
              body: '#445371',
              muted: '#8D96AF',
              faint: '#A1A9B8',
            },
            surface: {
              page: '#DFE2EA',
              card: '#FFFFFF',
              middle: '#F3F4F7',
              border: '#E7E9EF',
              'border-strong': '#CFD2D9',
            },
            header: {
              bg: '#181E2B',
            },
            state: {
              green: '#019F3C',
              red: '#D91528',
              yellow: '#FBB82B',
            }
          },
          fontFamily: {
            montserrat: ['Montserrat', 'sans-serif'],

          boxShadow: {
            'card': '0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06)',
            'card-hover': '0 2px 6px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.08)',
            'btn': '0 2px 8px rgba(3,153,233,0.25)',

      }
    }
  </script>
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="window._katexReady = true; document.dispatchEvent(new Event('katex-ready'));"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Counter input - hide native spinner */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }

    /* Smooth hover transitions - only transform & opacity */
    .task-row {
      transition: background-color 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .task-row:hover {
      background-color: #F0F9FF;
    }
    .task-row.has-selected {
      background-color: #E5F4FC;
    }

    .counter-btn {
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.15s ease;
    }
    .counter-btn:hover {
      transform: scale(1.12);
    }
    .counter-btn:active {
      transform: scale(0.95);
    }

    .generate-btn {
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.2s ease,
                  box-shadow 0.2s ease;
    }
    .generate-btn:hover {
      transform: translateY(-1px);
    }
    .generate-btn:active {
      transform: translateY(0px) scale(0.98);
    }

    /* Focus visible styles */
    .counter-btn:focus-visible,
    .generate-btn:focus-visible {
      outline: 2px solid #0399E9;
      outline-offset: 2px;
    }

    /* Part divider */
    .part-header {
      letter-spacing: -0.01em;
    }

    /* Prototype panel */
    .proto-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .proto-panel.open {
      max-height: 2000px;
    }

    .proto-row {
      transition: background-color 0.15s ease;
    }
    .proto-row:hover {
      background-color: #F8FAFE;
    }

    /* Expand arrow */
    .expand-arrow {
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      flex-shrink: 0;
    }
    .expanded .expand-arrow {
      transform: rotate(180deg);
    }

    /* Task preview text */
    .proto-preview-text {
      font-size: 12px;
      line-height: 1.5;
      color: #445371;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #EEEFF2; }
    ::-webkit-scrollbar-thumb { background: #BFC1C4; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #8D96AF; }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #E7E9EF 25%, #F3F4F7 50%, #E7E9EF 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>

  <!-- ==================== SCRIPTS ==================== -->
  <script>
    // ─── DATA ────────────────────────────────────────────────────────────────
    const FALLBACK_TASKS = [
      { id: 1,  topic: 'Вычисления', part: 1 },
      { id: 2,  topic: 'Числовые неравенства, координатная прямая', part: 1 },
      { id: 3,  topic: 'Числа и вычисления', part: 1 },
      { id: 4,  topic: 'Алгебраические выражения', part: 1 },
      { id: 5,  topic: 'Уравнения и неравенства', part: 1 },
      { id: 6,  topic: 'Графики функций', part: 1 },
      { id: 7,  topic: 'Арифметические и геометрические прогрессии', part: 1 },
      { id: 8,  topic: 'Неравенства и системы неравенств', part: 1 },
      { id: 9,  topic: 'Задачи по теории вероятностей', part: 1 },
      { id: 10, topic: 'Статистика, графики и диаграммы', part: 1 },
      { id: 11, topic: 'Числовые последовательности', part: 1 },
      { id: 12, topic: 'Преобразование выражений', part: 1 },
      { id: 13, topic: 'Алгебраические выражения и их преобразования', part: 1 },
      { id: 14, topic: 'Практико-ориентированные задачи', part: 1 },
      { id: 15, topic: 'Треугольники и их элементы', part: 1 },
      { id: 16, topic: 'Окружность, вписанные и центральные углы', part: 1 },
      { id: 17, topic: 'Четырёхугольники и их свойства', part: 1 },
      { id: 18, topic: 'Площади фигур', part: 1 },
      { id: 19, topic: 'Анализ геометрических высказываний', part: 1 },
      { id: 20, topic: 'Уравнения и системы уравнений', part: 2 },
      { id: 21, topic: 'Текстовые задачи', part: 2 },
      { id: 22, topic: 'Функции и их свойства', part: 2 },
      { id: 23, topic: 'Геометрическая задача (вычисление)', part: 2 },
      { id: 24, topic: 'Геометрическая задача (доказательство)', part: 2 },
      { id: 25, topic: 'Геометрическая задача повышенной сложности', part: 2 },
    ];

    let TASKS = FALLBACK_TASKS;

    /**
     * Задания 1-5 в ОГЭ идут ЕДИНЫМ БЛОКОМ — практико-ориентированная задача по тексту.
     * Каждый прототип = комплект из 5 заданий (typeId 1,2,3,4,5).
     * Виртуальный taskId = 0 представляет группу в UI как обычное задание.
     */
    const GROUP_1_5 = [1, 2, 3, 4, 5]; // typeId заданий, входящих в группу
    const VIRTUAL_ID_1_5 = 0;           // виртуальный taskId для блока 1-5

    /** Маппинг номера прототипа → название для UI */
    const PROTO_1_5_NAMES = {
      1: 'Дороги',
      2: 'Квартиры',
      3: 'Участки',
      4: 'Печи',
      5: 'Бумага',
      6: 'Шины',
      7: 'Мобильный интернет',
    };

    /** Статические прото для виртуального задания 0 */
    const PROTOS_1_5_STATIC = Object.entries(PROTO_1_5_NAMES).map(([id, name]) => ({
      prototype: parseInt(id),
      count: 0,
      preview: { text: '', images: [] },
      _name: name,
    }));

    /**
     * Три режима для каждого задания:
     *   'simple'   — нет раскрытия, просто счётчик (рандом)
     *   'checkbox' — раскрыт, чекбоксы прото, счётчик на строке задания
     *   'counter'  — раскрыт, счётчики у каждого прото
     *
     * taskMode[taskId] = 'simple' | 'checkbox' | 'counter'
     * simpleCounts[taskId] = N          — кол-во в simple/checkbox режиме
     * protoCounts[taskId][protoId] = N  — кол-во в counter режиме
     * protoEnabled[taskId][protoId] = bool — вкл/выкл в checkbox режиме
     * prototypesData[typeId] = [...] | null
     */
    const taskMode      = {};   // default 'simple'
    const simpleCounts  = {};
    const protoCounts   = {};
    const protoEnabled  = {};
    const prototypesData = {};
    const expandedRows   = new Set();

    // ─── INIT ───────────────────────────────────────────────────────────────

    function initCounts() {
      // Инициализируем виртуальный taskId=0 для блока 1-5
      const allIds = [VIRTUAL_ID_1_5, ...TASKS.map(t => t.id)];
      allIds.forEach(id => {
        if (taskMode[id]     === undefined) taskMode[id]     = 'simple';
        if (simpleCounts[id] === undefined) simpleCounts[id] = 0;
        if (!protoCounts[id])  protoCounts[id]  = {};
        if (!protoEnabled[id]) protoEnabled[id] = {};
      });
      // Виртуальный taskId=0 всегда использует статические прото — предзагружаем
      if (!prototypesData[VIRTUAL_ID_1_5]) {
        prototypesData[VIRTUAL_ID_1_5] = PROTOS_1_5_STATIC;
      }
    }
    initCounts();

    // ─── COUNTS HELPERS ─────────────────────────────────────────────────────

    /** Итоговое кол-во заданий данного типа для генерации */
    function taskTotal(taskId) {
      const mode = taskMode[taskId] || 'simple';
      if (mode === 'counter') {
        return Object.values(protoCounts[taskId] || {}).reduce((a, b) => a + b, 0);
      }
      return simpleCounts[taskId] || 0;
    }

    const MAX_TASKS = 200;

    function updateTotal() {
      // Виртуальный taskId=0: каждая единица = 5 заданий (один прототип = typeId 1-5)
      const group15Count = taskTotal(VIRTUAL_ID_1_5);
      const group15Total = group15Count * GROUP_1_5.length;
      const otherTotal = TASKS.filter(t => !GROUP_1_5.includes(t.id)).reduce((sum, t) => sum + taskTotal(t.id), 0);
      const total = group15Total + otherTotal;
      const countEl = document.getElementById('total-count');
      const btn = document.getElementById('generate-btn');
      const warnEl = document.getElementById('total-warn');
      countEl.textContent = total;
      if (total > MAX_TASKS) {
        countEl.classList.add('text-state-red');
        countEl.classList.remove('text-brand-blue');
        if (warnEl) warnEl.classList.remove('hidden');
        btn.disabled = true;
      } else {
        countEl.classList.remove('text-state-red');
        countEl.classList.add('text-brand-blue');
        if (warnEl) warnEl.classList.add('hidden');
        btn.disabled = total === 0;
      }
    }

    // ─── RENDER ─────────────────────────────────────────────────────────────

    /** Render KaTeX in an element */
    function renderKatexIn(el) {
      if (window.renderMathInElement) {
        renderMathInElement(el, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$',  right: '$',  display: false },
          ],
          throwOnError: false,
        });
      } else {
        document.addEventListener('katex-ready', () => renderMathInElement(el, {
          delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }],
          throwOnError: false,
        }), { once: true });
      }
    }

    /** Build proto preview HTML — поддерживает plain text и JSON-parts формат */
    function buildProtoPreviewHTML(preview) {
      let textHTML = '';
      let imgHTML  = '';
      const raw = preview.text || '';

      if (raw.trim().startsWith('[')) {
        // JSON-parts формат: каждый text — новая строка, img — inline после текста, drawing — центрированный блок
        try {
          const parts = JSON.parse(raw);
          let html = '';
          let currentLine = '';
          let prevText = '';
          function flushLine() {
            if (currentLine) { html += `<div style="margin-bottom:2px;">${currentLine}</div>`; currentLine = ''; }
          }
          for (let i = 0; i < parts.length; i++) {
            const p = parts[i];
            const next = parts[i + 1];
            if (p.type === 'drawing' && p.file) {
              flushLine();
              html += `<div style="text-align:center;margin:4px 0;"><img src="${p.file}" alt="" style="max-height:60px;max-width:100%;object-fit:contain;"></div>`;
            } else {
              if (p.newParagraph) flushLine();
              if (p.type === 'text') {
                if (currentLine) currentLine += ' ';
                currentLine += `<span>${(p.value || '').replace(/\s*Источники?:\s*.+$/s, '').trim()}</span>`;
                prevText = p.value || '';
              } else if (p.type === 'img' && p.file) {
                const isAnswerTable = /ответ/i.test(prevText);
                const isBlock = !next || next.newParagraph;
                if (isAnswerTable) {
                  if (currentLine) currentLine += ' ';
                  currentLine += `<img src="${p.file}" alt="" class="object-contain inline-block align-middle" style="height:auto;max-height:56px;max-width:100%;vertical-align:middle;display:inline-block;">`;
                } else if (isBlock) {
                  flushLine();
                  html += `<div style="text-align:center;margin:4px 0;"><img src="${p.file}" alt="" style="max-width:100%;height:auto;max-height:80px;object-fit:contain;"></div>`;
                } else {
                  if (currentLine) currentLine += ' ';
                  currentLine += `<img src="${p.file}" alt="" class="object-contain inline-block align-middle" style="height:1.4em;vertical-align:middle;display:inline-block;">`;
                }
              }
            }
          }
          flushLine();
          textHTML = html;
        } catch {
          textHTML = raw.replace(/\s*Источники?:\s*.+$/s, '').trim();
        }
      } else {
        textHTML = raw.replace(/\s*Источники?:\s*.+$/s, '').trim();
        if ((preview.images || []).length > 0) {
          imgHTML = `<img src="${preview.images[0]}" alt="" class="max-h-10 object-contain ml-2 inline-block align-middle" style="vertical-align:middle;">`;
        }
      }

      return `<span class="proto-preview-text">${textHTML}${imgHTML}</span>`;
    }

    /** Render prototype panel inside a task row */
    function renderProtoPanel(taskId) {
      const protos = prototypesData[taskId];
      const panel  = document.getElementById(`proto-panel-${taskId}`);
      if (!panel) return;

      const mode = taskMode[taskId] || 'simple';

      if (!protos || protos.length === 0) {
        panel.innerHTML = `
          <div class="bg-surface-middle/40 rounded-b-lg px-4 py-3 border-t border-surface-border">
            <p class="text-xs text-ink-muted font-medium pl-10">Прототипы не найдены в базе заданий</p>
          </div>`;
        return;
      }

      // Шапка панели: переключатель режима
      const headerHTML = `
        <div class="flex items-center justify-between px-4 py-2 border-b border-surface-border bg-surface-middle/60">
          <span class="text-[11px] font-semibold text-ink-muted uppercase tracking-wide pl-10">Прототипы задания</span>
          <div class="flex items-center gap-1 bg-surface-border rounded-lg p-0.5">
            <button
              onclick="setProtoMode(${taskId}, 'checkbox')"
              class="proto-mode-btn px-2.5 py-1 rounded-md text-[11px] font-semibold transition-colors ${mode === 'checkbox' ? 'bg-white text-brand-blue shadow-sm' : 'text-ink-muted hover:text-ink-dark'}"
              data-mode-btn="${taskId}" data-mode="checkbox"
              title="Выбрать прототипы (количество — на строке задания)"
            >
              <svg class="inline mr-1" width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="0.5" y="0.5" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M2.5 5.5l2 2 3.5-3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Вкл/выкл
            </button>
            <button
              onclick="setProtoMode(${taskId}, 'counter')"
              class="proto-mode-btn px-2.5 py-1 rounded-md text-[11px] font-semibold transition-colors ${mode === 'counter' ? 'bg-white text-brand-blue shadow-sm' : 'text-ink-muted hover:text-ink-dark'}"
              data-mode-btn="${taskId}" data-mode="counter"
              title="Задать количество для каждого прототипа отдельно"
            >
              <svg class="inline mr-1" width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 5.5h9M5.5 1v9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              Кол-во
            </button>
          </div>
        </div>`;

      // Инициализируем protoEnabled по умолчанию — все включены
      if (Object.keys(protoEnabled[taskId] || {}).length === 0) {
        protos.forEach(p => {
          protoEnabled[taskId][p.prototype] = true;
        });
      }

      // Строки прото
      const rows = protos.map(p => {
        const previewHTML = buildProtoPreviewHTML(p.preview);
        const isEnabled   = protoEnabled[taskId]?.[p.prototype] !== false;
        const cnt         = protoCounts[taskId]?.[p.prototype] || 0;

        const rightCtrl = mode === 'counter'
          // Режим COUNTER: счётчик у каждого прото
          ? `<div class="flex items-center gap-1 flex-shrink-0">
               <button class="counter-btn w-7 h-7 rounded-lg bg-surface-middle border border-surface-border flex items-center justify-center text-ink-muted hover:text-ink-dark hover:border-surface-border-strong"
                 data-action="decrease" data-task="${taskId}" data-proto="${p.prototype}">
                 <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
               </button>
               <input type="number" min="0" max="99" value="${cnt}"
                 class="w-9 h-7 text-center text-xs font-bold text-ink-dark bg-surface-card border border-surface-border rounded-lg focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue/30"
                 data-count-proto="${taskId}" data-proto="${p.prototype}"/>
               <button class="counter-btn w-7 h-7 rounded-lg bg-brand-blue-light border border-brand-blue/20 flex items-center justify-center text-brand-blue hover:bg-brand-blue hover:text-white"
                 data-action="increase" data-task="${taskId}" data-proto="${p.prototype}">
                 <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
               </button>
             </div>`
          // Режим CHECKBOX: тогл вкл/выкл
          : `<button
               onclick="toggleProtoEnabled(${taskId}, ${p.prototype})"
               class="flex-shrink-0 w-8 h-5 rounded-full border-2 transition-colors ${isEnabled ? 'bg-brand-blue border-brand-blue' : 'bg-surface-border border-surface-border-strong'}"
               style="position:relative;"
               aria-label="Включить прото ${p.prototype}"
             >
               <span class="absolute top-0.5 w-3 h-3 rounded-full bg-white shadow transition-transform ${isEnabled ? 'translate-x-[14px]' : 'translate-x-[1px]'}" style="display:block;"></span>
             </button>`;

        const rowOpacity = mode === 'checkbox' && !isEnabled ? 'opacity-40' : '';

        return `
          <div class="proto-row flex items-start gap-3 pl-4 pr-3 py-2.5 border-t border-surface-border/40 first:border-t-0 ${rowOpacity}" data-proto-row data-task="${taskId}" data-proto="${p.prototype}">
            <!-- Number badge -->
            <div class="w-9 h-9 rounded-full bg-brand-blue flex items-center justify-center flex-shrink-0 opacity-0 pointer-events-none" aria-hidden="true">
              <span class="text-white text-xs font-bold"></span>
            </div>
            <!-- Proto badge -->
            <div class="flex-shrink-0 mt-0.5">
              <span class="inline-flex items-center px-2 py-0.5 rounded-md bg-surface-middle border border-surface-border text-[10px] font-bold text-ink-muted whitespace-nowrap">
                ${taskId === VIRTUAL_ID_1_5 ? (PROTO_1_5_NAMES[p.prototype] || `Прото ${p.prototype}`) : `Прото ${p.prototype}`}
                ${p.count > 0 ? `<span class="ml-1 text-ink-faint font-medium">(${p.count})</span>` : ''}
              </span>
            </div>
            <!-- Preview -->
            <div class="flex-1 min-w-0 pt-0.5">
              ${previewHTML}
            </div>
            <!-- Right control -->
            ${rightCtrl}
          </div>`;
      }).join('');

      panel.innerHTML = `
        <div class="bg-white border-t border-surface-border">
          ${headerHTML}
          <div class="divide-y divide-surface-border/30">${rows}</div>
        </div>`;

      renderKatexIn(panel);
    }

    /** Render skeleton proto panel while loading */
    function renderProtoSkeleton(taskId) {
      const panel = document.getElementById(`proto-panel-${taskId}`);
      if (!panel) return;
      panel.innerHTML = `
        <div class="bg-surface-middle/40 rounded-b-lg overflow-hidden">
          ${[1, 2, 3].map(() => `
            <div class="flex items-center gap-3 pl-12 pr-3 py-3 border-t border-surface-border/50 first:border-t-0">
              <div class="skeleton h-5 w-20 flex-shrink-0"></div>
              <div class="flex-1 skeleton h-4"></div>
              <div class="skeleton h-7 w-24 flex-shrink-0"></div>
            </div>`).join('')}
        </div>`;
    }

    /** Update task row visual state */
    function updateTaskRowSummary(taskId) {
      const total = taskTotal(taskId);
      const mode  = taskMode[taskId] || 'simple';
      const row   = document.querySelector(`.task-row[data-task-id="${taskId}"]`);
      if (row) row.classList.toggle('has-selected', total > 0);

      // В режиме counter — показываем сумму в поле ввода (readonly-style)
      if (mode === 'counter') {
        const input = document.querySelector(`input[data-count="${taskId}"]`);
        if (input) {
          input.value = total;
          input.readOnly = true;
          input.style.opacity = '0.6';
          input.style.cursor  = 'default';
        }
      } else {
        const input = document.querySelector(`input[data-count="${taskId}"]`);
        if (input) {
          input.readOnly = false;
          input.style.opacity = '';
          input.style.cursor  = '';
        }
      }
    }

    /** Render a single task row */
    function renderTaskRow(task) {
      // Виртуальный taskId=0 — блок 1-5
      const isGroup15 = task.id === VIRTUAL_ID_1_5;
      const numStr = isGroup15 ? '1–5' : String(task.id).padStart(2, '0');
      const hasDb  = isGroup15 ? true : (task.count || 0) > 0;
      const dbBadge = isGroup15
        ? '' // нет бейджа "N в БД" для блока 1-5
        : hasDb
          ? `<span class="inline-block px-1.5 py-0.5 text-[10px] font-semibold rounded bg-state-green-light text-state-green ml-1">${task.count} в БД</span>`
          : `<span class="inline-block px-1.5 py-0.5 text-[10px] font-semibold rounded bg-surface-middle text-ink-faint ml-1">нет заданий</span>`;

      return `
        <div>
          <div
            class="task-row flex items-center gap-3 md:gap-4 py-3 px-2 md:px-3 rounded-lg -mx-2 md:-mx-3"
            data-task-id="${task.id}"
            data-has-db="${hasDb}"
          >
            <!-- Number badge — клик открывает панель -->
            <div
              class="w-9 h-9 rounded-full bg-brand-blue flex items-center justify-center flex-shrink-0 cursor-pointer select-none"
              onclick="toggleProtoPanel(${task.id})"
              title="Выбрать прототипы"
            >
              <span class="${isGroup15 ? 'text-white text-[9px] font-bold leading-none text-center' : 'text-white text-xs font-bold'}">${numStr}</span>
            </div>

            <!-- Task info — клик открывает панель -->
            <div class="flex-1 min-w-0 cursor-pointer select-none" onclick="toggleProtoPanel(${task.id})">
              <div class="text-sm font-semibold text-ink-dark flex items-center flex-wrap gap-x-1">
                ${isGroup15 ? 'Задания 1–5' : `Задание ${task.id}`}
                ${dbBadge}
              </div>
              <div class="text-xs text-ink-muted mt-0.5 truncate">${task.topic}</div>
            </div>

            <!-- Counter (всегда показывается) -->
            <div class="flex items-center gap-1.5 flex-shrink-0" id="task-counter-${task.id}">
              <button
                class="counter-btn w-8 h-8 rounded-lg bg-surface-middle border border-surface-border flex items-center justify-center text-ink-muted hover:text-ink-dark hover:border-surface-border-strong focus-visible:outline focus-visible:outline-2 focus-visible:outline-brand-blue"
                data-action="decrease-simple" data-task="${task.id}"
                aria-label="Уменьшить задание ${task.id}"
              >
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
              </button>
              <input
                type="number" min="0" max="99"
                value="${simpleCounts[task.id] || 0}"
                class="w-10 h-8 text-center text-sm font-semibold text-ink-dark bg-surface-card border border-surface-border rounded-lg focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue/30"
                data-count="${task.id}"
                aria-label="Количество задания ${task.id}"
              />
              <button
                class="counter-btn w-8 h-8 rounded-lg bg-brand-blue-light border border-brand-blue/20 flex items-center justify-center text-brand-blue hover:bg-brand-blue hover:text-white focus-visible:outline focus-visible:outline-2 focus-visible:outline-brand-blue"
                data-action="increase-simple" data-task="${task.id}"
                aria-label="Увеличить задание ${task.id}"
              >
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 3v8M3 7h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
              </button>

              <!-- Expand arrow (отдельная зона клика) -->
              <div class="cursor-pointer select-none pl-1" onclick="toggleProtoPanel(${task.id})" title="Выбрать прототипы">
                <svg class="expand-arrow text-ink-faint" id="arrow-${task.id}" width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
          </div>

          <!-- Prototype panel -->
          <div class="proto-panel -mx-2 md:-mx-3" id="proto-panel-${task.id}"></div>
        </div>
      `;
    }

    /** Render all tasks */
    function renderTasks() {
      const part1 = TASKS.filter(t => t.part === 1 && !GROUP_1_5.includes(t.id));
      const part2 = TASKS.filter(t => t.part === 2);

      // Виртуальный task для блока 1-5 первой строкой
      const virtualTask15 = { id: VIRTUAL_ID_1_5, topic: 'Практико-ориентированные задачи по тексту', part: 1 };
      document.getElementById('part1-tasks').innerHTML =
        renderTaskRow(virtualTask15) + part1.map(renderTaskRow).join('');
      document.getElementById('part2-tasks').innerHTML = part2.map(renderTaskRow).join('');
    }

    // ─── EXPAND / COLLAPSE ──────────────────────────────────────────────────

    async function toggleProtoPanel(taskId) {
      const panel  = document.getElementById(`proto-panel-${taskId}`);
      const arrow  = document.getElementById(`arrow-${taskId}`);
      if (!panel) return;

      const isOpen = expandedRows.has(taskId);

      if (isOpen) {
        panel.classList.remove('open');
        if (arrow) arrow.style.transform = '';
        expandedRows.delete(taskId);
        // Возвращаем режим simple если был переключён
        // (не сбрасываем — пусть запоминает)
        return;
      }

      panel.classList.add('open');
      if (arrow) arrow.style.transform = 'rotate(180deg)';
      expandedRows.add(taskId);

      // Виртуальный taskId=0 — данные статические, сразу рендерим
      if (taskId === VIRTUAL_ID_1_5) {
        renderProtoPanel(taskId);
        return;
      }

      // Если данные уже загружены
      if (prototypesData[taskId] !== undefined && prototypesData[taskId] !== null) {
        renderProtoPanel(taskId);
        return;
      }

      // Скелетон пока грузим
      renderProtoSkeleton(taskId);
      prototypesData[taskId] = null; // loading

      try {
        const res  = await fetch(`/api/tasks/prototypes-preview?typeIds=${taskId}`);
        const json = await res.json();
        prototypesData[taskId] = json.success ? (json.data[taskId] || []) : [];
      } catch {
        prototypesData[taskId] = [];
      }

      if (expandedRows.has(taskId)) {
        renderProtoPanel(taskId);
      }
    }

    // ─── РЕЖИМ ПАНЕЛИ ───────────────────────────────────────────────────────

    function setProtoMode(taskId, mode) {
      taskMode[taskId] = mode;

      // При переходе в counter — синхронизируем protoCounts из simpleCounts
      if (mode === 'counter') {
        // Если прото уже загружены — распределяем равномерно или оставляем как есть
        // Просто оставляем (пользователь сам выставит)
      }

      // При переходе в checkbox — простой счётчик снова активен
      updateTaskRowSummary(taskId);
      renderProtoPanel(taskId);
      updateTotal();
    }

    function toggleProtoEnabled(taskId, protoId) {
      if (!protoEnabled[taskId]) protoEnabled[taskId] = {};
      protoEnabled[taskId][protoId] = !(protoEnabled[taskId][protoId] !== false);
      renderProtoPanel(taskId);
      // Не меняем simpleCounts — количество задаётся в строке
    }

    // ─── COUNTER INTERACTIONS ───────────────────────────────────────────────

    function handleCounterClick(e) {
      // Счётчик прото (режим counter)
      const protoBtn = e.target.closest('[data-action="increase"][data-proto], [data-action="decrease"][data-proto]');
      if (protoBtn) {
        const taskId = parseInt(protoBtn.dataset.task);
        const proto  = parseInt(protoBtn.dataset.proto);
        const action = protoBtn.dataset.action;
        if (!protoCounts[taskId]) protoCounts[taskId] = {};
        const cur = protoCounts[taskId][proto] || 0;
        const globalTotal = TASKS.reduce((sum, t) => sum + taskTotal(t.id), 0) + taskTotal(VIRTUAL_ID_1_5) * GROUP_1_5.length;
        if (action === 'increase' && globalTotal >= MAX_TASKS) return;
        protoCounts[taskId][proto] = action === 'increase' ? Math.min(cur + 1, 99) : Math.max(cur - 1, 0);
        const inp = document.querySelector(`input[data-count-proto="${taskId}"][data-proto="${proto}"]`);
        if (inp) inp.value = protoCounts[taskId][proto];
        updateTaskRowSummary(taskId);
        updateTotal();
        return;
      }

      // Счётчик задания (simple / checkbox режим)
      const simpleBtn = e.target.closest('[data-action="increase-simple"], [data-action="decrease-simple"]');
      if (simpleBtn) {
        const taskId = parseInt(simpleBtn.dataset.task);
        const action = simpleBtn.dataset.action;
        const mode   = taskMode[taskId] || 'simple';
        if (mode === 'counter') return; // в counter режиме кнопки заблокированы визуально
        const cur = simpleCounts[taskId] || 0;
        const globalTotal = TASKS.reduce((sum, t) => sum + taskTotal(t.id), 0) + taskTotal(VIRTUAL_ID_1_5) * GROUP_1_5.length;
        if (action === 'increase-simple' && globalTotal >= MAX_TASKS) return;
        simpleCounts[taskId] = action === 'increase-simple' ? Math.min(cur + 1, 99) : Math.max(cur - 1, 0);
        const inp = document.querySelector(`input[data-count="${taskId}"]`);
        if (inp) inp.value = simpleCounts[taskId];
        updateTaskRowSummary(taskId);
        updateTotal();
      }
    }

    function handleCounterInput(e) {
      // Прото счётчик
      if (e.target.matches('input[data-count-proto]')) {
        const taskId = parseInt(e.target.dataset.countProto);
        const proto  = parseInt(e.target.dataset.proto);
        if (!protoCounts[taskId]) protoCounts[taskId] = {};
        const otherTotal = TASKS.reduce((sum, t) => sum + taskTotal(t.id), 0) - (protoCounts[taskId][proto] || 0);
        let val = Math.max(0, Math.min(99, Math.min(MAX_TASKS - otherTotal, parseInt(e.target.value) || 0)));
        protoCounts[taskId][proto] = val;
        e.target.value = val;
        updateTaskRowSummary(taskId);
        updateTotal();
        return;
      }
      // Простой счётчик
      if (e.target.matches('input[data-count]')) {
        const taskId = parseInt(e.target.dataset.count);
        const mode   = taskMode[taskId] || 'simple';
        if (mode === 'counter') return; // readonly
        const otherTotal = TASKS.reduce((sum, t) => sum + taskTotal(t.id), 0) - (simpleCounts[taskId] || 0);
        let val = Math.max(0, Math.min(99, Math.min(MAX_TASKS - otherTotal, parseInt(e.target.value) || 0)));
        simpleCounts[taskId] = val;
        e.target.value = val;
        updateTaskRowSummary(taskId);
        updateTotal();
      }
    }

    // ─── GENERATE ───────────────────────────────────────────────────────────

    async function generateVariant() {
      const parts = [];

      // Виртуальный task 0 (блок 1-5) — формат set15:protoId:count
      // Сервер выбирает целые комплекты по 5 заданий
      const mode15 = taskMode[VIRTUAL_ID_1_5] || 'simple';
      if (mode15 === 'counter') {
        Object.entries(protoCounts[VIRTUAL_ID_1_5] || {}).forEach(([proto, cnt]) => {
          if (cnt > 0) parts.push(`set15:${proto}:${cnt}`);
        });
      } else if (mode15 === 'checkbox') {
        const cnt15 = simpleCounts[VIRTUAL_ID_1_5] || 0;
        if (cnt15 > 0) {
          const protos15 = prototypesData[VIRTUAL_ID_1_5] || PROTOS_1_5_STATIC;
          const enabled15 = protos15.filter(p => protoEnabled[VIRTUAL_ID_1_5]?.[p.prototype] !== false);
          if (enabled15.length === 0) {
            parts.push(`set15:${cnt15}`);
          } else {
            const base = Math.floor(cnt15 / enabled15.length);
            const rem  = cnt15 % enabled15.length;
            enabled15.forEach((p, i) => {
              const n = base + (i < rem ? 1 : 0);
              if (n > 0) parts.push(`set15:${p.prototype}:${n}`);
            });
          }
        }
      } else {
        // simple: каждая единица = 1 комплект (случайный прототип)
        const cnt15 = simpleCounts[VIRTUAL_ID_1_5] || 0;
        if (cnt15 > 0) {
          parts.push(`set15:${cnt15}`);
        }
      }

      TASKS.forEach(task => {
        // Пропускаем задания 1-5 — они уже добавлены выше
        if (GROUP_1_5.includes(task.id)) return;

        const mode = taskMode[task.id] || 'simple';

        if (mode === 'counter') {
          // Режим 3: конкретные прото с кол-вом
          Object.entries(protoCounts[task.id] || {}).forEach(([proto, cnt]) => {
            if (cnt > 0) parts.push(`${task.id}:${proto}:${cnt}`);
          });

        } else if (mode === 'checkbox') {
          // Режим 2: выбранные прото, количество = simpleCounts, рандом внутри прото
          const cnt  = simpleCounts[task.id] || 0;
          if (cnt === 0) return;

          const protos = prototypesData[task.id];
          if (!protos || protos.length === 0) {
            // Нет данных о прото — рандом
            parts.push(`${task.id}:${cnt}`);
            return;
          }

          const enabled = protos.filter(p => protoEnabled[task.id]?.[p.prototype] !== false);
          if (enabled.length === 0) {
            parts.push(`${task.id}:${cnt}`);
            return;
          }

          // Распределяем cnt равномерно по включённым прото
          const base = Math.floor(cnt / enabled.length);
          const rem  = cnt % enabled.length;
          enabled.forEach((p, i) => {
            const n = base + (i < rem ? 1 : 0);
            if (n > 0) parts.push(`${task.id}:${p.prototype}:${n}`);
          });

        } else {
          // Режим 1: simple — рандом
          const cnt = simpleCounts[task.id] || 0;
          if (cnt > 0) parts.push(`${task.id}:${cnt}`);
        }
      });

      if (!parts.length) return;

      const config = parts.join(',');

      // Сохраняем вариант в БД → получаем постоянный ID
      const btn = document.getElementById('generate-btn');
      btn.disabled = true;
      btn.textContent = 'Создание...';

      try {
        const res  = await fetch('/api/variants', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ config }),
        });
        const json = await res.json();
        if (json.success) {
          window.location.href = `variant.html?id=${json.id}`;
        } else {
          // fallback: без сохранения
          window.location.href = `variant.html?config=${encodeURIComponent(config)}`;
        }
      } catch {
        // fallback при недоступности API
        window.location.href = `variant.html?config=${encodeURIComponent(config)}`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Создать вариант';
      }
    }

    // ─── LOAD DATA ──────────────────────────────────────────────────────────

    async function loadTaskTypes() {
      try {
        const res  = await fetch('/api/task-types');
        const json = await res.json();
        if (json.success && json.data.length > 0) {
          TASKS = json.data.map(t => ({ id: t.id, topic: t.topic, part: t.part, count: t._count?.tasks ?? 0 }));
          initCounts(); // инициализирует simpleCounts и taskMode для новых задач
        }
      } catch {
        // fallback уже установлен
      }
    }

    // ─── SELECT ALL ─────────────────────────────────────────────────────────

    function toggleSelectAll(part) {
      const btn = document.getElementById(`select-all-part${part}`);
      const isSelected = btn.dataset.selected === 'true';
      const newState = !isSelected;

      // Для части 1 — включаем/выключаем виртуальный task 0 (блок 1-5)
      if (part === 1) {
        simpleCounts[VIRTUAL_ID_1_5] = newState ? 1 : 0;
        const inp = document.querySelector(`input[data-count="${VIRTUAL_ID_1_5}"]`);
        if (inp) inp.value = simpleCounts[VIRTUAL_ID_1_5];
        updateTaskRowSummary(VIRTUAL_ID_1_5);
      }

      TASKS.filter(t => t.part === part && !GROUP_1_5.includes(t.id)).forEach(task => {
        simpleCounts[task.id] = newState ? 1 : 0;
        const inp = document.querySelector(`input[data-count="${task.id}"]`);
        if (inp) inp.value = simpleCounts[task.id];
        updateTaskRowSummary(task.id);
      });

      btn.dataset.selected = String(newState);
      const checkIcon = document.getElementById(`part${part}-check`);
      if (checkIcon) checkIcon.style.display = newState ? 'inline' : 'none';
      if (newState) {
        btn.style.color = '#0399E9';
        btn.style.borderColor = '#0399E9';
        btn.style.background = '#E5F4FC';
      } else {
        btn.style.color = '';
        btn.style.borderColor = '';
        btn.style.background = '';
      }

      updateTotal();
    }

    function updateSelectAllCheckboxes() {
      [1, 2].forEach(part => {
        const btn = document.getElementById(`select-all-part${part}`);
        if (!btn) return;
        const partTasks = TASKS.filter(t => t.part === part && !GROUP_1_5.includes(t.id));
        const otherSelected = partTasks.every(t => (simpleCounts[t.id] || 0) > 0 || taskTotal(t.id) > 0);
        // Для части 1 также проверяем виртуальный task 0
        const group15Selected = part === 1 ? taskTotal(VIRTUAL_ID_1_5) > 0 : true;
        const allSelected = otherSelected && group15Selected;
        btn.dataset.selected = String(allSelected);
        const checkIcon = document.getElementById(`part${part}-check`);
        if (checkIcon) checkIcon.style.display = allSelected ? 'inline' : 'none';
        if (allSelected) {
          btn.style.color = '#0399E9';
          btn.style.borderColor = '#0399E9';
          btn.style.background = '#E5F4FC';
        } else {
          btn.style.color = '';
          btn.style.borderColor = '';
          btn.style.background = '';
        }
      });
    }

    // ─── INIT ────────────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', async () => {
      await loadTaskTypes();
      renderTasks();
      updateTotal();

      document.addEventListener('click', (e) => {
        handleCounterClick(e);
        updateSelectAllCheckboxes();
      });
      document.addEventListener('input', (e) => {
        handleCounterInput(e);
        updateSelectAllCheckboxes();
      });
      document.getElementById('generate-btn').addEventListener('click', generateVariant);
    });
  </script>
</body>
</html>
